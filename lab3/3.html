<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gaming Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #0f0f0f, #1a1a40);
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
    }
    .section {
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 0 15px rgba(0,255,255,0.3);
    }
    .badge {
      font-size: 0.9rem;
      padding: 0.5em 0.7em;
      border-radius: 8px;
    }
    .btn-glow {
      background-color: #ff0066;
      color: #fff;
      border: none;
      box-shadow: 0 0 10px #ff0066;
    }
    .btn-glow:hover {
      background-color: #ff3385;
      box-shadow: 0 0 20px #ff3385;
    }
    .btn-group .btn {
      border-radius: 0;
    }
  </style>
</head>
<body>

<div class="container mt-4">

 
  <div class="section bg-warning">
    <h3 class="mb-3">🎮 Game Hub</h3>
    <div class="input-group mb-3">
      <span class="input-group-text">🔍</span>
      <input type="text" class="form-control" placeholder="Search for a game...">
      <button class="btn btn-glow">Search</button>
    </div>
    <span class="badge bg-danger">🔥 Trending</span>
    <span class="badge bg-success">✔ Available</span>
    <div class="btn-group ms-3" role="group">
      <button type="button" class="btn btn-dark">Home</button>
      <button type="button" class="btn btn-dark">Library</button>
      <button type="button" class="btn btn-dark">Settings</button>
    </div>
  </div>

 
  <div class="row">
 
    <div class="col-md-4 section bg-dark">
      <h4>🎲 Add New Game</h4>
      <div class="input-group mb-3">
        <span class="input-group-text">🎮</span>
        <input type="text" class="form-control" placeholder="Game Title">
      </div>
      <button class="btn btn-glow">Add Game</button>
      <span class="badge bg-info ms-2">New Release</span>
    </div>


    <div class="col-md-4 section bg-secondary">
      <h4>⚔️ Game Actions</h4>
      <div class="btn-group mb-3" role="group">
        <button type="button" class="btn btn-success">Play</button>
        <button type="button" class="btn btn-warning">Pause</button>
        <button type="button" class="btn btn-danger">Delete</button>
      </div>
      <div class="input-group">
        <span class="input-group-text">🏆</span>
        <input type="text" class="form-control" placeholder="High Score">
      </div>
      <span class="badge bg-primary mt-2">Leaderboard</span>
    </div>


    <div class="col-md-4 section bg-dark">
      <h4>📊 Game Status</h4>
      <div class="input-group mb-3">
        <span class="input-group-text">💎</span>
        <input type="number" class="form-control" placeholder="Coins">
      </div>
      <button class="btn btn-glow">Update Stats</button>
      <div class="mt-2">
        <span class="badge bg-warning text-dark">In Progress</span>
        <span class="badge bg-success">Completed</span>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
