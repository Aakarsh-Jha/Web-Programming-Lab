<body>
    <header>
        <h1>Twinkle Twinkle Little Star</h1>
    </header>

    <main>
        <p>Twinkle, twinkle, little <b>star</b>,<br>
           How I wonder what you <b>are!</b><br>
           Up above the world so <b>high,</b><br>
           Like a diamond in the <b>sky.</b><br>

           When the blazing sun is <b>gone,</b><br>
           When he nothing shines <b>upon,</b><br>
           Then you show your little <b>light,</b><br>
           Twinkle, twinkle, all the <b>night.</b></p>
    </main>

        <p></p>
