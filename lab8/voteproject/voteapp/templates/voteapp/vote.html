<!DOCTYPE html>
<html>
<head>
    <title>Book Voting</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow">
                <div class="card-header bg-primary text-white text-center">
                    <h5>How is the book ASP.NET with C# by Vipul Prakashan?</h5>
                </div>

                <div class="card-body">

                    <form method="POST">
                        {% csrf_token %}

                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="choice" value="Good" required>
                            <label class="form-check-label">
                                Good 
                                {% if total_votes > 0 %} 
                                    - {{ percentages.Good }}%
                                {% endif %}
                            </label>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="choice" value="Satisfactory">
                            <label class="form-check-label">
                                Satisfactory 
                                {% if total_votes > 0 %}
                                    - {{ percentages.Satisfactory }}%
                                {% endif %}
                            </label>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="choice" value="Bad">
                            <label class="form-check-label">
                                Bad 
                                {% if total_votes > 0 %}
                                    - {{ percentages.Bad }}%
                                {% endif %}
                            </label>
                        </div>

                        <div class="d-grid mt-3">
                            <button type="submit" class="btn btn-success">
                                Vote
                            </button>
                        </div>

                    </form>

                    {% if total_votes > 0 %}
                        <p class="text-center mt-3 text-muted">
                            Total Votes: {{ total_votes }}
                        </p>
                    {% endif %}

                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
