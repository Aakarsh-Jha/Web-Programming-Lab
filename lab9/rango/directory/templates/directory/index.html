<!DOCTYPE html>
<html>
<head><title>Website Directory</title></head>
<body>

<h1>Website Directory</h1>
<a href="/add_category/">Add Category</a> | <a href="/add_page/">Add Page</a>
<hr>

<h2>Categories</h2>
<table border="1">
  <tr><th>Name</th><th>Visits</th><th>Likes</th></tr>
  {% for cat in categories %}
  <tr><td>{{ cat.name }}</td><td>{{ cat.visits }}</td><td>{{ cat.likes }}</td></tr>
  {% endfor %}
</table>

<h2>Pages</h2>
<table border="1">
  <tr><th>Category</th><th>Title</th><th>URL</th><th>Views</th></tr>
  {% for page in pages %}
  <tr>
    <td>{{ page.category.name }}</td>
    <td>{{ page.title }}</td>
    <td><a href="{{ page.url }}">{{ page.url }}</a></td>
    <td>{{ page.views }}</td>
  </tr>
  {% endfor %}
</table>

</body>
</html>
