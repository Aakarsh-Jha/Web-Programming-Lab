<!DOCTYPE html>
<html>
<head>
<title>Search</title>
<style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; background: #f5f5f5; }
    h2 { color: #333; }
    form { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
    table { width: 100%; }
    input[type=text] { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
    input[type=submit] { margin-top: 15px; padding: 10px 24px; background: #2196F3;
                         color: white; border: none; border-radius: 5px; cursor: pointer; }
    input[type=submit]:hover { background: #1976D2; }
    .results { margin-top: 20px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
    .results table { border-collapse: collapse; width: 100%; }
    .results th, .results td { border: 1px solid #ddd; padding: 10px; text-align: left; }
    .results th { background: #f2f2f2; }
    a { color: #2196F3; }
</style>
</head>
<body>
<h2>Search by Company</h2>
<form action="/search/" method="POST">
    {% csrf_token %}
    <table>{{ form.as_table }}</table>
    <input type="submit" value="Search">
</form>

{% if results %}
<div class="results">
    <h3>Results for "{{ company }}"</h3>
    <table>
        <tr><th>Person Name</th><th>Street</th><th>City</th></tr>
        {% for r in results %}
        <tr><td>{{ r.name }}</td><td>{{ r.street }}</td><td>{{ r.city }}</td></tr>
        {% endfor %}
    </table>
</div>
{% elif company %}
    <p>No results found for "{{ company }}"</p>
{% endif %}

<br><a href="/">← Back</a>
</body>
</html>
