<!DOCTYPE html>
<html>
<head>
  <title>Institutes</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; background: #f5f5f5; }
    h2 { color: #333; border-bottom: 2px solid #4CAF50; padding-bottom: 8px; }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      margin-bottom: 30px;
    }
    th {
      background: #4CAF50;
      color: white;
      padding: 12px 16px;
      text-align: left;
    }
    td {
      padding: 10px 16px;
      border-bottom: 1px solid #eee;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f9f9f9; }
    select {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: white;
      font-size: 1rem;
    }
  </style>
</head>
<body>

  <h2>Institute List</h2>
  <table>
    <tr>
      <th>Institute ID</th>
      <th>Name</th>
      <th>No of Courses</th>
    </tr>
    {% for inst in institutes %}
    <tr>
      <td>{{ inst.institute_id }}</td>
      <td>{{ inst.name }}</td>
      <td>{{ inst.no_of_courses }}</td>
    </tr>
    {% endfor %}
  </table>

  <h2>Institute Names (Listbox)</h2>
  <select size="5">
    {% for inst in institutes %}
    <option>{{ inst.name }}</option>
    {% endfor %}
  </select>

</body>
</html>
